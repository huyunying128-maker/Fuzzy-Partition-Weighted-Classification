experiment:
  name: mnist_local_hpd
  output_dir: outputs
  random_state: 0

data:
  data_dir: data/mnist
  train_size: 48000
  test_size: 12000
  shuffle: true
  download: true

model:
  partition_kind: fuzzy
  n_centers: 1920
  fuzzifier: 1.30
  beta: 1.25
  degree: 4
  truncation: hpd
  tolerance: 1.0e-6
  max_partition_iter: 100
  polynomial_interaction_mode: powers
  epsilon: 1.0e-12

logistic:
  C: 1.0
  solver: lbfgs
  max_iter: 1000
  fit_intercept: false
