experiment:
  name: mnist_local_all_truncations
  output_dir: outputs
  random_state: 0

data:
  data_dir: data/mnist
  train_size: 48000
  test_size: 12000
  shuffle: true
  download: true

model:
  partition_kind: fuzzy
  degree: 4
  tolerance: 1.0e-6
  max_partition_iter: 100
  polynomial_interaction_mode: powers
  epsilon: 1.0e-12

logistic:
  C: 1.0
  solver: lbfgs
  max_iter: 1000
  fit_intercept: false

truncations:
  - name: dtd
    display_name: DTD
    n_centers: 1840
    fuzzifier: 1.30
    beta: 1.10
    meaning: distance-table movement
  - name: harmonic
    display_name: Harmonic
    n_centers: 1860
    fuzzifier: 1.30
    beta: 1.15
    meaning: harmonic distance-change control
  - name: shannon_entropy
    display_name: Shannon entropy
    n_centers: 1880
    fuzzifier: 1.30
    beta: 1.20
    meaning: membership uncertainty
  - name: square_probability
    display_name: Square probability
    n_centers: 1900
    fuzzifier: 1.30
    beta: 1.23
    meaning: squared-membership concentration
  - name: hpd
    display_name: HPD
    n_centers: 1920
    fuzzifier: 1.30
    beta: 1.25
    meaning: partition inheritance
