experiment:
  name: mnist_centroid_visualization
  output_dir: outputs
  random_state: 0

data:
  data_dir: data/mnist
  train_size: 48000
  test_size: 12000
  shuffle: true
  download: true

visualization:
  digit_label: 4
  sample_rank: 0
  fuzzifier: 1.3
  beta: 1.25
  blend_alpha: 0.5
  image_shape: [28, 28]
  dpi: 300
